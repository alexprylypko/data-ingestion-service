version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: transactions
      POSTGRES_USER: txuser
      POSTGRES_PASSWORD: txpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U txuser -d transactions"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__WriteConnection: "Host=db;Database=transactions;Username=txuser;Password=txpassword"
      ConnectionStrings__ReadConnection: "Host=db;Database=transactions;Username=txuser;Password=txpassword"
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
